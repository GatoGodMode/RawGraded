<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1560" role="img" aria-labelledby="title desc">
  <title id="title">RawEngine-Local AI Process Flow</title>
  <desc id="desc">Studio desktop pipeline: Ollama vision catalogs defects and identity; deterministic math engine computes all grades from defects and ruler centering.</desc>

  <defs>
