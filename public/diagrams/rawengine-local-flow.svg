      <stop offset="0%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d4a7a"/>
      <stop offset="100%" stop-color="#1e3558"/>
    </linearGradient>
    <linearGradient id="mathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d6b4f"/>
      <stop offset="100%" stop-color="#2a4d38"/>
    </linearGradient>
    <linearGradient id="stateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c4a1f"/>
      <stop offset="100%" stop-color="#3d3215"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8899aa"/>
